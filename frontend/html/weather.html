<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.26.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.26.0/mapbox-gl.js"></script>
</head>
<body>

    <nav>
        <div class="logo">Muffin</div>

        <div class="links-container">
            <a id ="home" href="#">Home</a>
            <a id ="activities" href="#">Activities</a>
            <a id = "about" href="#">About</a>
        </div>

    </nav>

    <main>

        <h1>Weather App</h1>
        <p>This website uses the OpenWeatherMap API to provide
            you with the latest weather conditions for your city.</p>

        <p>For states and countries, please enter a two-letter abbreviation.</p>

        <div class="search-container">
            <input
                    type="text"
                    id = "inputCity"
                    placeholder="Enter city name">

            <label for = "inputCity">City</label>

            <p></p>

            <input
                    type="text"
                    id = "inputState"
                    placeholder = "Enter state">

            <label for = "inputState">State (if applicable)</label>

            <p></p>

            <input
                    type="text"
                    id = "inputCountry"
                    placeholder="Enter Country name">

            <label for = "inputCountry">Country</label>

            <p></p>

            <div id = "unitOptions">
                <input
                    type="radio"
                    id = "fToggle"
                    name = "tempChoice"
                    value = "fahrenheit"
                >
                <label for = "fToggle">Fahrenheit</label>

                <input
                    type="radio"
                    id = "cToggle"
                    name = "tempChoice"
                    value = "celsius"
                >
                <label for = "cToggle">Celsius</label>
            </div>
        </div>

        <p></p>

        <div class="buttons-container">
            <button
                id= "getWeather"
                type="button">

                Get Weather!</button>
            <p></p>
            <button
                    id = "getMap"
                    type="button">
                Generate Map</button>
        </div>


        <p></p>

        <div class = "main-container">
            <div class="weather-card">
                <h2 id="cityName"></h2>
                <p id="conditions"></p>
                <div id="temperature"></div>
                <p id="feels-like"></p>
                <p id="winds"></p>
            </div>
            <div id="map"></div>
        </div>

    </main>

    <script src="index.js"></script>

</body>
</html>
